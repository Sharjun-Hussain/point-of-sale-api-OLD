# --- Inzeedo POS: Host-Side Nginx Gateway ---
# Place this at /etc/nginx/sites-available/pos.inzeedo.lk

server {
    listen 80;
    server_name api-pos.inzeedo.lk; # Your Domain

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api-pos.inzeedo.lk;

    # SSL Configuration (Update these paths after running Certbot!)
    ssl_certificate /etc/letsencrypt/live/api-pos.inzeedo.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-pos.inzeedo.lk/privkey.pem;

    # Performance & Security
    gzip on;
    add_header X-Frame-Options "SAMEORIGIN";
    client_max_body_size 10M;

    # 1. API & UPLOADS Gateway
    # Routes all traffic to the Docker API Container (Port 5000)
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
